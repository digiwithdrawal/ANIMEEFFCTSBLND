<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime FX Exporter</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">🟠 Anime FX Exporter</div>
      <div class="hint">One effect at a time · Export GLB / FBX · Import into Blender</div>
    </header>

    <aside class="left-panel">
      <div class="tabs">
        <button id="tab3d" class="tab active">3D FX</button>
        <button id="tab2d" class="tab">2D FX</button>
      </div>

      <div id="effectList" class="effect-list"></div>
    </aside>

    <main id="viewport" class="viewport">
      <div class="viewport-label">3D VIEW</div>
    </main>

    <aside class="right-panel">
      <h2 id="fxTitle">Power Ball</h2>
      <p id="fxDesc">Animated anime effect.</p>

      <label>Base Color</label>
      <input id="baseColor" type="color" value="#28d7ff" />

      <label>Accent Color</label>
      <input id="accentColor" type="color" value="#ffffff" />

      <label>Scale</label>
      <input id="scale" type="range" min="0.3" max="5" step="0.1" value="1.6" />

      <label>Glow / Opacity</label>
      <input id="glow" type="range" min="0.2" max="3" step="0.1" value="1.2" />

      <label>Speed</label>
      <input id="speed" type="range" min="0.2" max="4" step="0.1" value="1.2" />

      <label>Length</label>
      <input id="length" type="range" min="1" max="10" step="0.1" value="4" />

      <label>Density</label>
      <input id="density" type="range" min="3" max="40" step="1" value="16" />

      <div class="buttons">
        <button id="resetCam" class="gray">Reset Camera</button>
        <button id="exportGLB" class="blue">Export GLB</button>
        <button id="exportFBX" class="orange">Export FBX</button>
      </div>

      <p class="note">Exports only the current selected effect. 2D FX export as planes/cards in 3D space.</p>
    </aside>

    <footer class="statusbar">
      <span class="green-dot"></span>
      Looping preview: Playing
      <span class="controls-note">Orbit: left drag · Zoom: wheel · Pan: right drag</span>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
